<!DOCTYPE html>
<html lang="ar" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>استخرج من النص - التكنولوجيا</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #f3f4f6; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px; 
            font-family: 'Noto Naskh Arabic', serif; 
            overflow: hidden;
        }

        #welcome-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(243, 244, 246, 0.98);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .welcome-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        .input-group {
            margin: 20px 0;
            direction: ltr;
        }

        .input-group input {
            padding: 10px;
            font-size: 18px;
            border: 2px solid #d1d5db;
            border-radius: 8px;
            width: 100%;
            text-align: center;
        }

        .start-btn {
            padding: 10px 40px;
            font-size: 20px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }

        .app-container {
            display: flex;
            flex-direction: row;
            width: 100%;
            max-width: 1400px; 
            background: white;
            border-radius: 12px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            height: 95vh;
            position: relative;
            filter: blur(5px); 
        }

        .sidebar {
            width: 350px; 
            background-color: #ffffff;
            padding: 15px 10px; 
            display: flex;
            flex-direction: column;
            border-right: 1px solid #e5e7eb; 
            direction: ltr;
        }

        .instruction-text {
            font-size: 11px;
            color: #4b5563;
            text-align: left;
            direction: ltr;
            margin-top: 5px;
            margin-bottom: 10px;
            font-family: sans-serif;
            line-height: 1.3;
        }

        .score-stamp {
            display: none;
            color: #ef4444;
            font-size: 18px;
            font-weight: 900;
            text-align: center;
            border: 3px dashed #ef4444;
            padding: 5px;
            transform: rotate(-5deg);
            margin-bottom: 5px;
        }

        .title-container { text-align: right; margin-bottom: 5px; direction: rtl; }
        .title { color: #000; font-size: 18px; font-weight: 900; border-bottom: 3px solid #eab308; display: block; }
        
        .categories-list { display: flex; flex-direction: column; gap: 4px; direction: rtl; flex-grow: 1; overflow-y: auto; } 
        
        .category-btn {
            display: flex; align-items: center; 
            padding: 8px 12px; 
            background-color: #ffffff;
            border: 1px solid #f3f4f6;
            border-radius: 8px;
            cursor: pointer; position: relative;
            white-space: nowrap; 
        }

        .category-btn .translation-popup {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            white-space: nowrap;
            display: none;
            z-index: 10;
        }

        .dot { width: 10px; height: 10px; border-radius: 50%; margin-left: 10px; flex-shrink: 0; }
        
        .cat-label { font-size: 14px; font-weight: 900; color: #000; } 
        .cat-counter { font-size: 11px; color: #6b7280; font-family: sans-serif; margin-right: 5px; }
        .cat-status { font-size: 12px; font-weight: bold; margin-right: auto; padding-right: 5px; }

        .submit-btn {
            margin-top: 10px;
            padding: 12px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            font-family: sans-serif;
        }

        .text-area {
            flex-grow: 1; 
            background-color: #fefce8; 
            padding: 20px 35px; 
            direction: rtl;
            overflow-y: auto;
        }

        .reading-text {
            font-size: 22px; 
            line-height: 2.5; 
            color: #000;
            text-align: justify;
            font-weight: bold; 
        }

        .word {
            cursor: pointer; padding: 1px 3px; border-radius: 4px;
            border-bottom: 2px solid transparent; display: inline-block;
        }

        @media (max-width: 900px) {
            .app-container { flex-direction: column-reverse; height: auto; overflow: visible;}
            .sidebar { width: 100%; border: none; }
            body { overflow: auto; height: auto; }
        }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div class="welcome-box">
            <h2>Welcome to the linguistic analysis activity.</h2>
            <div class="input-group">
                <input type="text" id="student-name" placeholder="Your name..." autocomplete="off">
            </div>
            <button class="start-btn" onclick="startQuiz()">Start</button>
        </div>
    </div>

    <div class="app-container" id="capture-area">
        <aside class="sidebar">
            <div class="score-stamp" id="score-stamp">
                <div id="stamp-name"></div>
                <div id="stamp-score"></div>
            </div>
            <div class="title-container">
                <h2 class="title">اسْتَخْرِج مِن النَّصِّ</h2>
                <p class="instruction-text">
                    (Click an item to hear it & select 1 matching word in the text. Click Submit when done.)
                </p>
            </div>
            
            <div class="categories-list" id="categories-container"></div>
            
            <button class="submit-btn" id="submit-btn" onclick="submitQuiz()">Submit & Send to Teacher</button>
        </aside>

        <main class="text-area">
            <div id="text-container" class="reading-text"></div>
        </main>
    </div>

    <script>
        let studentName = "";
        let categories = [
            { id: 'c1', label: 'جمع مؤنث سالم', en: 'Sound Feminine Plural', color: '#3b82f6' },
            { id: 'c2', label: 'جمع تكسير', en: 'Broken Plural', color: '#22c55e' },
            { id: 'c3', label: 'فعل مضارع', en: 'Present Tense Verb', color: '#f59e0b' },
            { id: 'c5', label: 'مرادف (من خلال)', en: 'Synonym', color: '#06b6d4' },
            { id: 'c6', label: 'ضد (نَتَّفِقُ)', en: 'Antonym', color: '#ef4444' },
            { id: 'c7', label: 'جمع (مَوْقِع)', en: 'Plural', color: '#ec4899' },
            { id: 'c8', label: 'مفرد (التَّحَدِّيَات)', en: 'Singular', color: '#14b8a6' },
            { id: 'c9', label: 'أسلوب تَعَجُّب', en: 'Exclamatory Style', color: '#8b5cf6' }
        ];

        // تم تحديث الإجابة لتكون الجملة كاملة
        const rawAnswers = {
            'c1': ['حالات', 'المنشورات', 'الفيديوهات', 'مهارات'],
            'c2': ['الاخبار', 'الاحداث', 'اصدقائي', 'مواقع', 'الصور', 'الالعاب', 'المشاكل', 'المتاجر'],
            'c3': ['نتفق', 'نختلف', 'يمكنني', 'اتصفح', 'اتعرف', 'تكون', 'اقضي', 'اتفاعل', 'نراسل', 'نشارك', 'نتبادل', 'استمتع', 'تعطيني', 'اطور', 'اضيف', 'اعشق'],
            'c5': ['عبر'],
            'c6': ['نختلف'],
            'c7': ['مواقع'], 
            'c8': ['التحدي'],
            'c9': ['ما أهم التكنولوجيا !'] 
        };

        const rawText = `نَتَّفِقُ أَوْ نَخْتَلِفُ، فَإِنَّهُ لَا غِنَى عَنِ التِّكْنُولُوجْيَا فِي حَيَاتِنَا الْيَوْمِيَّةِ ، حَيْثُ يُمْكِنُنِي أَنْ أَتَصَفَّحَ الْأَخْبَارَ وَ أَتَعَرَّفَ عَلَى الْأَحْدَاثِ الْمَحَلِّيَّةِ وَالْعَالَمِيَّةِ ، وَ أَيْضًا حَالَاتِ الطَّقْسِ وَ النَّشْرَةِ الْجَوِّيَّةِ. ما أهم التكنولوجيا ! <br>
وَفِي وَقْتِ الْفَرَاغِ، تَكُونُ التِّكْنُولُوجْيَا مَصْدَرًا لِلتَّرْفِيهِ وَالتَّسْلِيَةِ. أَقْضِي الْكَثِيرَ مِنَ الْوَقْتِ وَأَنَا أَتَفَاعَلُ مَعَ أَصْدِقَائِي عَبْرَ مَوَاقِعِ التَّوَاصُلِ الِاجْتِمَاعِيِّ مِثْلَ فِيسْبُوك وَ إِنْسْتِجْرَام وَ سْنَابْ شَات، حَيْثُ نُرَاسِلُ بَعْضَنَا، وَ نُشَارِكُ الْمَنشُورَاتِ وَ الْفِيدْيُوهَاتِ، وَ نَتَبَادَلُ الْأَخْبَارَ وَ الصُّوَرَ. <br>
كَذَلِكَ، أَسْتَمْتِعُ بِلَعِبِ الْأَلْعَابِ الإِلِكْتُرُونِيَّةِ الَّتِي تُعْطِينِي فُرْصَةً لِلْمُتْعَةِ وَ التَّحَدِّي، وَ فِي نَفْسِ الْوَقْتِ أُطَوِّرُ مَهَارَاتِ التَّفْكِيرِ وَالتَّخْطِيطِ وَحَلِّ الْمَشَاكِلِ. وَ أُضِيفُ أَيْضًا أَنِّي أَعْشَقُ التَّسَوُّقَ عَبْرَ الْمَتَاجِرِ الإِلِكْتُرُونِيَّةِ عَلَى الإِنْتِرْنِت.`;

        function normalizeArabic(text) {
            return text.replace(/[\u064B-\u065F\u0640]/g, "").replace(/[أإآٱ]/g, "ا").replace(/ة/g, "ه").replace(/[يى]/g, "ي").replace(/[،.؛؟!"'!-]/g, "").trim();
        }

        function startQuiz() {
            let nameInput = document.getElementById('student-name').value.trim();
            if (!nameInput) return alert("Please enter your name");
            studentName = nameInput;
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('capture-area').style.filter = 'none';
        }

        const textContainer = document.getElementById('text-container');
        
        // استبدال مؤقت لجملة التعجب لمنع تقسيمها
        let processedText = rawText.replace('ما أهم التكنولوجيا !', 'EXACT_PHRASE_MARKER');
        processedText = processedText.replace(/([\u0600-\u06FF]+)/g, '<span class="word">$1</span>');
        // إعادة جملة التعجب ككتلة واحدة (span واحد)
        processedText = processedText.replace('EXACT_PHRASE_MARKER', '<span class="word">ما أهم التكنولوجيا !</span>');
        
        textContainer.innerHTML = processedText;

        const allSpans = document.querySelectorAll('.word');
        const counts = {};
        categories.forEach(cat => {
            let validList = rawAnswers[cat.id].map(normalizeArabic);
            let found = 0;
            allSpans.forEach(s => { if(validList.includes(normalizeArabic(s.textContent))) found++; });
            counts[cat.id] = found; 
        });

        let activeId = null;
        let activeColor = null;
        let userChoices = {};
        let translationTimers = {};

        const catListUI = document.getElementById('categories-container');
        categories.forEach(cat => {
            const btn = document.createElement('div');
            btn.className = 'category-btn';
            btn.id = `btn-${cat.id}`;
            btn.innerHTML = `
                <div class="translation-popup" id="popup-${cat.id}">${cat.en}</div>
                <span class="dot" style="background-color: ${cat.color}"></span>
                <div style="display:flex; align-items: baseline;">
                    <span class="cat-label">${cat.label}</span>
                    <span class="cat-counter">(Answers: ${counts[cat.id]})</span>
                </div>
                <span class="cat-status" id="status-${cat.id}"></span>
            `;
            btn.onclick = () => {
                document.querySelectorAll('.category-btn').forEach(b => {b.style.background="white";});
                btn.style.background = cat.color + "33";
                activeId = cat.id;
                activeColor = cat.color;

                const popup = document.getElementById(`popup-${cat.id}`);
                popup.style.display = 'block';
                if(translationTimers[cat.id]) clearTimeout(translationTimers[cat.id]);
                translationTimers[cat.id] = setTimeout(() => {
                    popup.style.display = 'none';
                }, 5000);

                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    let m = new SpeechSynthesisUtterance(cat.label); m.lang='ar-SA'; window.speechSynthesis.speak(m);
                }
            };
            catListUI.appendChild(btn);
        });

        allSpans.forEach(span => {
            span.onclick = () => {
                if(!activeId) return alert("Select a requirement first");
                if(userChoices[activeId]) {
                    userChoices[activeId].style.background = "";
                    userChoices[activeId].style.borderBottomColor = "transparent";
                }
                userChoices[activeId] = span;
                span.style.background = activeColor + "44";
                span.style.borderBottomColor = activeColor;
                document.getElementById(`status-${activeId}`).innerText = " Selected ";
                document.getElementById(`status-${activeId}`).style.color = "#3b82f6";
            };
        });

        function submitQuiz() {
            let score = 0;
            categories.forEach(cat => {
                let sel = userChoices[cat.id];
                let stat = document.getElementById(`status-${cat.id}`);
                if(sel && rawAnswers[cat.id].map(normalizeArabic).includes(normalizeArabic(sel.textContent))) {
                    score++; stat.innerText = " ✔ "; stat.style.color = "#10b981";
                } else {
                    stat.innerText = " ✘ "; stat.style.color = "#ef4444";
                }
            });

            document.getElementById('score-stamp').style.display = 'block';
            document.getElementById('stamp-name').innerText = studentName;
            document.getElementById('stamp-score').innerText = `Score: ${score}/${categories.length}`;
            document.getElementById('submit-btn').style.display = 'none';

            allSpans.forEach(s => {
                let w = normalizeArabic(s.textContent);
                for(let id in rawAnswers) {
                    if(rawAnswers[id].map(normalizeArabic).includes(w)) {
                        s.style.borderBottom = `2px dashed ${categories.find(c=>c.id===id).color}`;
                    }
                }
            });

            setTimeout(() => {
                html2canvas(document.body).then(canvas => {
                    let a = document.createElement('a');
                    a.download = `${studentName}_result.png`;
                    a.href = canvas.toDataURL();
                    a.click();
                });
            }, 500);
        }
    </script>
</body>
</html>
