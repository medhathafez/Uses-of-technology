<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استخرج من النص - التكنولوجيا</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #f3f4f6; 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 2vh 1vw; 
            font-family: 'Noto Naskh Arabic', serif; 
        }

        .app-container {
            display: flex;
            flex-direction: row;
            width: 100%;
            max-width: 1400px;
            background: white;
            border-radius: 12px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            overflow-y: auto;
            max-height: 96vh;
        }

        .app-container::-webkit-scrollbar { width: 10px; }
        .app-container::-webkit-scrollbar-track { background: #f9fafb; border-radius: 12px;}
        .app-container::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        .app-container::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

        .sidebar {
            width: 320px;
            background-color: #ffffff;
            padding: 15px 20px; 
            display: flex;
            flex-direction: column;
            border-right: 1px solid #e5e7eb; 
            direction: ltr;
            height: fit-content;
        }

        .title-container { text-align: right; margin-bottom: 15px; direction: rtl; }
        .title {
            color: #000000;
            font-size: 18px; 
            font-weight: 900;
            position: relative;
            display: inline-block;
            padding-bottom: 5px;
        }
        .title::after { content: ''; position: absolute; bottom: 0; right: 0; width: 100%; height: 3px; background-color: #eab308; }
        
        .instruction { 
            font-size: 11px; 
            color: #4b5563; 
            margin-bottom: 12px; 
            text-align: left; 
            direction: ltr; 
            line-height: 1.3;
            font-family: sans-serif; 
        }
        
        .categories-list { display: flex; flex-direction: column; gap: 6px; direction: rtl; }
        
        .category-btn {
            display: flex; align-items: center; justify-content: flex-start; 
            padding: 8px 10px; 
            background-color: #ffffff;
            border: 2px solid #f3f4f6; /* جعل الإطار أوضح قليلاً */
            border-radius: 8px;
            cursor: pointer; transition: all 0.3s ease; position: relative;
        }
        .category-btn:hover { background-color: #f9fafb; }

        /* التعديل الجديد: تظليل الزر المختار بنفس لون الإجابات */
        .category-btn.active {
            border-style: solid;
            box-shadow: inset 0 0 0 2px rgba(0,0,0,0.05); /* ظل داخلي خفيف */
        }
        
        .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-left: 10px; flex-shrink: 0; }
        
        .cat-text-container { 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: flex-start; 
            width: 100%; 
            overflow: hidden;
        }
        .cat-label { 
            font-size: 15px; 
            color: #000000;
            font-weight: 900;
            white-space: nowrap; 
        } 
        .cat-counter { 
            font-size: 11px; 
            color: #6b7280; 
            margin-top: 0px; 
            font-family: sans-serif; 
        }

        .text-area {
            flex-grow: 1; 
            background-color: #fefce8; 
            padding: 30px 4vw; 
            direction: rtl;
            height: fit-content;
        }

        .reading-text {
            font-size: 20px; 
            line-height: 2.5; 
            color: #000000;
            text-align: justify;
            font-weight: 900;
        }

        .word {
            cursor: pointer; padding: 2px 4px; border-radius: 6px; transition: all 0.3s ease;
            border-bottom: 3px solid transparent; display: inline-block;
        }
        .word:hover { background-color: rgba(0,0,0,0.05); }
        .word.highlighted { color: #000; pointer-events: none; }
        
        .floating-praise {
            position: absolute;
            font-weight: 900;
            font-size: 20px;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            z-index: 1000;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-40px) scale(1.5); }
        }

        @media (max-width: 900px) {
            .app-container { flex-direction: column-reverse; max-height: none; }
            .sidebar { width: 100%; border-right: none; border-top: 1px solid #e5e7eb; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="title-container">
                <h2 class="title">اسْتَخْرِج مِن النَّصِّ</h2>
            </div>
            <p class="instruction">Click the item once, then select <strong>all</strong> matching words in the text.</p>
            <div class="categories-list" id="categories-container"></div>
        </aside>

        <main class="text-area">
            <div id="text-container" class="reading-text"></div>
        </main>
    </div>

    <script>
        const successWords = ["رَائِع", "مُمْتَاز", "جَيِّد جِدًّا", "أَحْسَنْت"];

        const categories = [
            { id: 'c1', label: 'جمع مؤنث سالم', color: '#3b82f6' },
            { id: 'c2', label: 'جمع تكسير', color: '#22c55e' },
            { id: 'c3', label: 'فعل مضارع', color: '#f59e0b' },
            { id: 'c4', label: 'مرادف (مُمْتِعَة)', color: '#8b5cf6' },
            { id: 'c5', label: 'مرادف (من خلال)', color: '#06b6d4' },
            { id: 'c6', label: 'ضد (نَتَّفِقُ)', color: '#ef4444' },
            { id: 'c7', label: 'جمع (مَوْقِع)', color: '#ec4899' },
            { id: 'c8', label: 'مفرد (التَّحَدِّيَات)', color: '#14b8a6' }
        ];

        const correctAnswers = {
            'c1': ['حالات', 'المنشورات', 'الفيديوهات', 'مهارات'],
            'c2': ['الاخبار', 'الاحداث', 'اصدقائي', 'مواقع', 'الصور', 'الالعاب', 'المشاكل', 'المتاجر'],
            'c3': ['نتفق', 'نختلف', 'يمكنني', 'اتصفح', 'اتعرف', 'تكون', 'اقضي', 'اتفاعل', 'نراسل', 'نشارك', 'نتبادل', 'استمتع', 'تعطيني', 'اطور', 'اضيف', 'اعشق'],
            'c4': ['للتسليه', 'والتسليه', 'للمتعه', 'والمتعه'], 
            'c5': ['عبر'],
            'c6': ['نختلف'],
            'c7': ['مواقع'], 
            'c8': ['التحدي']
        };

        const rawText = `نَتَّفِقُ أَوْ نَخْتَلِفُ، فَإِنَّهُ لَا غِنَى عَنِ التَّكْنُولُوجِيَا فِي حَيَاتِنَا الْيَوْمِيَّةِ ، حَيْثُ يُمْكِنُنِي أَنْ أَتَصَفَّحَ الْأَخْبَارَ وَ أَتَعَرَّفَ عَلَى الْأَحْدَاثِ الْمَحَلِّيَّةِ وَالْعَالَمِيَّةِ ، وَ أَيْضًا حَالَاتِ الطَّقْسِ وَ النَّشْرَةِ الْجَوِّيَّةِ . <br> وَفِي وَقْتِ الْفَرَاغِ، تَكُونُ التَّكْنُولُوجِيَا مَصْدَرًا لِلتَّرْفِيهِ وَالتَّسْلِيَةِ . أَقْضِي الْكَثِيرَ مِنَ الْوَقْتِ وَأَنَا أَتَفَاعَلُ مَعَ أَصْدِقَائِي عَبْرَ مَوَاقِعِ التَّوَاصُلِ الِاجْتِمَاعِيِّ مِثْلَ فِيسْبُوك وَ إِنْسْتِجْرَام وَ سْنَأب شَات، حَيْثُ نُرَاسِلُ بَعْضَنَا، وَ نُشَارِكُ الْمَنْشُورَاتِ وَ الْفِيدْيُوهَاتِ، وَ نَتَبَادَلُ الْأَخْبَارَ وَ الصُّوَرَ . <br> كَذَلِكَ، أَسْتَمْتِعُ بِلَعِبِ الْأَلْعَابِ الْإِلِكْتُرُونِيَّةِ الَّتِي تُعْطِينِي فُرْصَةً لِلْمُتْعَةِ وَ التَّحَدِّي، وَ فِي نَفْسِ الْوَقْتِ أُطَوِّرُ مَهَارَاتِ التَّفْكِيرِ وَالتَّخْطِيطِ وَحَلِّ الْمَشَاكِلِ . وَ أُضِيفُ أَيْضًا أَنِّي أَعْشَقُ التَّسَوُّقَ عَبْرَ الْمَتَاجِرِ الْإِلِكْتُرُونِيَّةِ عَلَى الْإِنْتِرْنِت .`;

        const textContainer = document.getElementById('text-container');
        let processedHTML = rawText.replace(/([\u0600-\u06FF]+)/g, '<span class="word">$1</span>');
        textContainer.innerHTML = processedHTML;

        function normalizeArabic(word) {
            return word.replace(/[\u064B-\u065F\u0640]/g, "") 
                       .replace(/[أإآٱ]/g, "ا") 
                       .replace(/ة/g, "ه") 
                       .replace(/[يى]/g, "ي") 
                       .replace(/[،.؛؟]/g, "") 
                       .trim();
        }

        function hexToRgba(hex, alpha) {
            let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        let remainingAnswers = {};
        categories.forEach(cat => remainingAnswers[cat.id] = 0);

        const allWordSpans = document.querySelectorAll('.word');
        allWordSpans.forEach(span => {
            let cleanWord = normalizeArabic(span.textContent);
            for (const [catId, answers] of Object.entries(correctAnswers)) {
                if (answers.includes(cleanWord)) {
                    remainingAnswers[catId]++;
                    let validFor = span.dataset.validCats ? span.dataset.validCats.split(',') : [];
                    validFor.push(catId);
                    span.dataset.validCats = validFor.join(',');
                }
            }
        });

        const categoriesContainer = document.getElementById('categories-container');
        let activeCategoryId = null;
        let activeColor = null;
        let activeBtn = null;

        categories.forEach(cat => {
            const btn = document.createElement('div');
            btn.className = 'category-btn';
            btn.id = `btn-${cat.id}`;
            btn.onclick = () => selectCategory(cat.id, cat.color, btn);
            
            btn.innerHTML = `
                <span class="dot" style="background-color: ${cat.color};"></span>
                <div class="cat-text-container">
                    <span class="cat-label">${cat.label}</span>
                    <span class="cat-counter" id="counter-${cat.id}">(${remainingAnswers[cat.id]} answers)</span>
                </div>
            `;
            categoriesContainer.appendChild(btn);
        });

        function selectCategory(id, color, btnElement) {
            // إعادة الأزرار السابقة لشكلها الطبيعي
            document.querySelectorAll('.category-btn').forEach(b => {
                b.classList.remove('active');
                b.style.backgroundColor = "#ffffff";
                b.style.borderColor = "#f3f4f6";
            });

            // تظليل الزر المختار بنفس نمط الإجابات
            btnElement.classList.add('active');
            btnElement.style.backgroundColor = hexToRgba(color, 0.3);
            btnElement.style.borderColor = color;

            activeBtn = btnElement;
            activeCategoryId = id;
            activeColor = color;
        }

        function playErrorSound() {
            if ('speechSynthesis' in window) {
                let msg = new SpeechSynthesisUtterance("حَاوِلْ مَرَّةً أُخْرَى");
                msg.lang = 'ar-SA';
                window.speechSynthesis.speak(msg);
            }
        }

        function playSuccessSound() {
            if ('speechSynthesis' in window) {
                let randomWord = successWords[Math.floor(Math.random() * successWords.length)];
                let msg = new SpeechSynthesisUtterance(`${randomWord}، إِجَابَة صَحِيحَة`);
                msg.lang = 'ar-SA';
                window.speechSynthesis.speak(msg);
            }
        }

        function showFloatingPraise(element, color, text) {
            let rect = element.getBoundingClientRect();
            let praiseEl = document.createElement('div');
            praiseEl.className = 'floating-praise';
            praiseEl.innerText = text;
            praiseEl.style.color = color;
            praiseEl.style.left = rect.left + 'px';
            praiseEl.style.top = (rect.top - 20) + 'px';
            document.body.appendChild(praiseEl);
            setTimeout(() => praiseEl.remove(), 1000);
        }

        allWordSpans.forEach(span => {
            span.onclick = function() {
                if (!activeCategoryId) {
                    alert("Please select an item from the sidebar first.");
                    return;
                }
                let validCategories = this.dataset.validCats ? this.dataset.validCats.split(',') : [];
                if (validCategories.includes(activeCategoryId)) {
                    this.style.backgroundColor = hexToRgba(activeColor, 0.3);
                    this.style.borderBottomColor = activeColor;
                    this.classList.add('highlighted'); 
                    playSuccessSound();
                    let randomWord = successWords[Math.floor(Math.random() * successWords.length)];
                    showFloatingPraise(this, activeColor, randomWord);
                    if (remainingAnswers[activeCategoryId] > 0) {
                        remainingAnswers[activeCategoryId]--;
                        document.getElementById(`counter-${activeCategoryId}`).innerText = `(${remainingAnswers[activeCategoryId]} answers)`;
                        if (remainingAnswers[activeCategoryId] === 0) {
                            document.getElementById(`btn-${activeCategoryId}`).style.opacity = '0.5'; 
                        }
                    }
                } else {
                    playErrorSound();
                    this.style.transform = "translateX(5px)";
                    setTimeout(() => this.style.transform = "translateX(-5px)", 100);
                    setTimeout(() => this.style.transform = "translateX(0)", 200);
                }
            };
        });
    </script>
</body>
</html>
