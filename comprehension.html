<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شريط قريباً المتحرك</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #2b2b4a; /* لون خلفية داكن لإبراز الشريط الأصفر */
            height: 100vh;
            display: flex;
            align-items: center; /* توسيط الشريط في منتصف الشاشة عمودياً */
            overflow: hidden; /* إخفاء أي أشرطة تمرير */
        }

        /* تنسيق الشريط الأصفر */
        .yellow-bar {
            width: 100%;
            height: 120px;
            background-color: #ffd700; /* أصفر فاقع */
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            overflow: hidden; /* لمنع النص من الظهور خارج الشريط */
        }

        /* الحاوية المتحركة للنص */
        .moving-text-container {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            white-space: nowrap;
            /* سرعة مرور الكلمة من اليسار لليمين (8 ثوانٍ) */
            animation: scrollLeftToRight 8s linear infinite;
        }

        /* تنسيق الكلمات */
        .text-ar, .text-en {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            font-family: 'Amiri', serif;
            font-size: 64px;
            font-weight: 700; /* بونط عريض */
            color: #000000;
        }

        /* أنيميشن الوميض والتبديل للكلمة العربية */
        .text-ar {
            animation: blinkSwapAr 4s infinite;
        }

        /* أنيميشن الوميض والتبديل للكلمة الإنجليزية */
        .text-en {
            animation: blinkSwapEn 4s infinite;
        }

        /* 1. حركة المرور من اليسار إلى اليمين */
        @keyframes scrollLeftToRight {
            0% { left: -250px; } /* تبدأ من خارج الشاشة يساراً */
            100% { left: 100vw; } /* تنتهي خارج الشاشة يميناً */
        }

        /* 2. الوميض للكلمة العربية (تظهر ثم تختفي) */
        @keyframes blinkSwapAr {
            0%, 40% { opacity: 1; }  /* ظاهرة */
            45%, 100% { opacity: 0; } /* وميض (اختفاء) */
        }

        /* 3. الوميض للكلمة الإنجليزية (تختفي ثم تظهر) */
        @keyframes blinkSwapEn {
            0%, 45% { opacity: 0; }   /* مخفية أثناء ظهور العربية */
            50%, 90% { opacity: 1; }  /* ظاهرة */
            95%, 100% { opacity: 0; } /* وميض (اختفاء) */
        }

    </style>
</head>
<body>

    <div class="yellow-bar">
        <div class="moving-text-container">
            <span class="text-ar">قريبًا</span>
            <span class="text-en">Soon</span>
        </div>
    </div>

</body>
</html>
