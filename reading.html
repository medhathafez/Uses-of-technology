<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Activity - Uses of Technology</title>
    <link href="https://fonts.googleapis.com/css2?family=Dubai:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Dubai', sans-serif;
        }

        body {
            background-color: #e2e8f0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 2vh 2vw;
        }

        .app-container {
            display: flex;
            flex-direction: row;
            width: 100%;
            max-width: 1200px;
            height: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            overflow: hidden;
            direction: ltr; 
        }

        /* --- لوحة التحكم --- */
        .controls-panel {
            width: 250px;
            background: #f8fafc;
            border-right: 2px solid #e2e8f0;
            padding: 2vh 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5vh;
            justify-content: center;
            align-items: center;
        }

        .speed-controls {
            display: flex;
            gap: 4px;
            background: #e2e8f0;
            padding: 4px;
            border-radius: 20px;
            width: 100%;
            margin-bottom: 1vh;
        }
        .speed-btn {
            flex: 1;
            padding: 0.5rem 0;
            border: none;
            border-radius: 16px;
            background: transparent;
            color: #475569;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
        }
        .speed-btn.active { background: white; color: #0f172a; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        hr { border: 0; height: 1px; background: #cbd5e1; width: 80%; margin: 1vh 0; }

        /* تصميم الأزرار والتلميحات (Tooltips) */
        .btn-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 60px; 
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.5px;
        }

        .tooltip {
            position: absolute;
            bottom: 115%;
            left: 50%;
            transform: translateX(-50%);
            background: #0f172a;
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            pointer-events: none;
            z-index: 20;
            font-weight: normal;
        }
        .tooltip::after {
            content: ''; position: absolute; top: 100%; left: 50%;
            transform: translateX(-50%); border-width: 5px; border-style: solid;
            border-color: #0f172a transparent transparent transparent;
        }
        .btn-wrapper:hover .tooltip { opacity: 1; visibility: visible; bottom: 125%; }

        .btn-listen { background: #3b82f6; color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        .btn-listen:hover { background: #2563eb; transform: scale(1.02); }

        .btn-record { background: #e2e8f0; color: #334155; }
        .btn-record:hover { background: #cbd5e1; }
        .btn-record.recording {
            background: #ef4444; color: white;
            animation: pulseRecord 1.5s infinite;
        }

        .btn-play-mine { display: none; background: #f59e0b; color: white; }
        .btn-play-mine.show { display: flex; box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3); }
        .btn-play-mine:hover { background: #d97706; transform: scale(1.02); }

        .btn-submit { background: #10b981; color: white; opacity: 0.4; cursor: not-allowed; }
        .btn-submit.ready { opacity: 1; cursor: pointer; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
        .btn-submit.ready:hover { background: #059669; transform: scale(1.02); }

        @keyframes pulseRecord {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* --- مساحة النص --- */
        .text-panel {
            flex-grow: 1;
            padding: 3vh 4vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: stretch;
            direction: rtl; 
            background: #ffffff;
        }

        /* عنوان قابل للتمرير والترجمة */
        .main-title {
            position: relative;
            font-size: clamp(20px, 2.8vw, 32px);
            color: #0f172a;
            margin-bottom: 2vh;
            border-bottom: 2px solid #cbd5e1;
            padding-bottom: 5px;
            cursor: pointer;
            align-self: center;
        }
        .main-title::after {
            content: attr(data-en);
            position: absolute; bottom: 100%; left: 50%;
            transform: translateX(-50%) translateY(5px);
            background: #0f172a; color: #fff; padding: 4px 10px;
            border-radius: 6px; font-size: 16px; white-space: nowrap;
            opacity: 0; visibility: hidden; transition: 0.2s;
            pointer-events: none; font-family: Arial, sans-serif; direction: ltr; font-weight: normal;
        }
        .main-title:hover::after { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(-2px); }

        /* حاوية النص بمحاذاة لليمين وتقليل الفراغات */
        .reading-content {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start; /* محاذاة لليمين بفضل اتجاه rtl */
            align-content: flex-start;
            gap: 1vh 0.4vw; /* تقليل المسافات الأفقية لإزالة الفراغات الزائدة */
            width: 100%;
            max-width: 950px;
            margin: 0 auto;
        }

        .word {
            position: relative;
            cursor: pointer;
            padding: 0 2px;
            border-radius: 4px;
            font-size: clamp(14px, 1.8vw, 22px); 
            font-weight: bold;
            transition: background-color 0.2s, transform 0.2s;
        }

        .word.highlight {
            background-color: rgba(255, 235, 59, 0.8);
            color: #000 !important;
            transform: scale(1.1);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 2;
        }

        .word::after {
            content: attr(data-en);
            position: absolute; bottom: 100%; left: 50%;
            transform: translateX(-50%) translateY(5px);
            background: #0f172a; color: #fff; padding: 4px 8px;
            border-radius: 6px; font-size: 14px; white-space: nowrap;
            opacity: 0; visibility: hidden; transition: 0.2s;
            pointer-events: none; font-family: Arial, sans-serif; font-weight: normal; direction: ltr; z-index: 10;
        }
        .word:hover::after { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(-2px); }

        @media (max-width: 800px) {
            .app-container { flex-direction: column; }
            .controls-panel { width: 100%; flex-direction: row; flex-wrap: wrap; border-right: none; border-bottom: 2px solid #e2e8f0; padding: 2vh; }
            .btn-wrapper { width: 45%; }
            .speed-controls { width: 100%; order: -1; }
            hr { display: none; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="controls-panel">
            <div class="speed-controls">
                <button class="speed-btn" onclick="setSpeed(0.5, this)">Slow</button>
                <button class="speed-btn active" onclick="setSpeed(0.9, this)">Normal</button>
                <button class="speed-btn" onclick="setSpeed(1.5, this)">Fast</button>
            </div>
            
            <div class="btn-wrapper">
                <span class="tooltip">Hear the text read aloud</span>
                <button id="btn-listen" class="btn btn-listen" onclick="startListening()">Listen 🔊</button>
            </div>
            
            <hr>
            
            <div class="btn-wrapper">
                <span class="tooltip">Click to record your voice</span>
                <button id="btn-record" class="btn btn-record" onclick="toggleRecording()">Record 🎤</button>
            </div>

            <div class="btn-wrapper">
                <span class="tooltip">Listen to your recording</span>
                <button id="btn-play-mine" class="btn btn-play-mine" onclick="playMyRecording()">Play 🎧</button>
            </div>
            
            <div class="btn-wrapper">
                <span class="tooltip">Save recording to device</span>
                <button id="btn-submit" class="btn btn-submit" disabled onclick="downloadRecording()">Submit 📤</button>
            </div>
        </aside>

        <main class="text-panel">
            <h1 class="main-title" data-en="Uses of Technology">استخدامات التكنولوجيا</h1>
            <div id="reading-text-container" class="reading-content">
                </div>
        </main>
    </div>

    <script>
        // --- 1. إعداد بيانات النص مع ترتيب الفقرات والفواصل ---
        const textData = [
            // الفقرة الأولى
            {ar: "نَتَّفِقُ", en: "We agree", color: "#4CAF50"},
            {ar: "أَوْ", en: "or", color: "#4CAF50"},
            {ar: "نَخْتَلِفُ،", en: "disagree,", color: "#4CAF50"},
            {ar: "فَإِنَّهُ", en: "it is", color: "#4CAF50"},
            {ar: "لَا", en: "not", color: "#4CAF50"},
            {ar: "غِنَى", en: "dispensable", color: "#333"},
            {ar: "عَنِ", en: "from", color: "#333"},
            {ar: "التِّكْنُولُوجْيَا", en: "technology", color: "#333"},
            {ar: "فِي", en: "in", color: "#333"},
            {ar: "حَيَاتِنَا", en: "our life", color: "#333"},
            {ar: "الْيَوْمِيَّةِ،", en: "daily,", color: "#333"},
            {ar: "حَيْثُ", en: "where", color: "#ff0844"},
            {ar: "يُمْكِنُنِي", en: "I can", color: "#333"},
            {ar: "أَنْ", en: "to", color: "#333"},
            {ar: "أَتَصَفَّحَ", en: "browse", color: "#333"},
            {ar: "الْأَخْبَارَ", en: "the news", color: "#333"},
            {ar: "وَ", en: "and", color: "#333"},
            {ar: "أَتَعَرَّفَ", en: "learn", color: "#333"},
            {ar: "عَلَى", en: "about", color: "#333"},
            {ar: "الْأَحْدَاثِ", en: "events", color: "#333"},
            {ar: "الْمَحَلِّيَّةِ", en: "local", color: "#333"},
            {ar: "وَالْعَالَمِيَّةِ،", en: "and global,", color: "#333"},
            {ar: "وَ", en: "and", color: "#ff0844"},
            {ar: "أَيْضًا", en: "also", color: "#ff0844"},
            {ar: "حَالَاتِ", en: "conditions", color: "#333"},
            {ar: "الطَّقْسِ", en: "weather", color: "#333"},
            {ar: "وَ", en: "and", color: "#333"},
            {ar: "النَّشْرَةِ", en: "forecast", color: "#333"},
            {ar: "الْجَوِّيَّةِ.", en: "weather.", color: "#333"},
            {ar: "مَا", en: "What", color: "#333"},
            {ar: "أَهَم", en: "is most important", color: "#333"},
            {ar: "التكنولوجيا", en: "technology", color: "#333"},
            {ar: "!", en: "!", color: "#333"},

            {ar: "<br>", en: "", color: ""}, // فاصل الفقرة الأولى

            // الفقرة الثانية
            {ar: "وَفِي", en: "And in", color: "#333"},
            {ar: "وَقْتِ", en: "time", color: "#333"},
            {ar: "الْفَرَاغِ،", en: "free,", color: "#333"},
            {ar: "تَكُونُ", en: "is", color: "#333"},
            {ar: "التِّكْنُولُوجْيَا", en: "technology", color: "#333"},
            {ar: "مَصْدَرًا", en: "a source", color: "#333"},
            {ar: "لِلتَّرْفِيهِ", en: "for entertainment", color: "#333"},
            {ar: "وَالتَّسْلِيَةِ.", en: "and amusement.", color: "#333"},
            {ar: "أَقْضِي", en: "I spend", color: "#333"},
            {ar: "الْكَثِيرَ", en: "a lot", color: "#333"},
            {ar: "مِنَ", en: "of", color: "#333"},
            {ar: "الْوَقْتِ", en: "time", color: "#333"},
            {ar: "وَأَنَا", en: "while I", color: "#333"},
            {ar: "أَتَفَاعَلُ", en: "interact", color: "#333"},
            {ar: "مَعَ", en: "with", color: "#333"},
            {ar: "أَصْدِقَائِي", en: "my friends", color: "#333"},
            {ar: "عَبْرَ", en: "via", color: "#333"},
            {ar: "مَوَاقِعِ", en: "platforms", color: "#333"},
            {ar: "التَّوَاصُلِ", en: "communication", color: "#333"},
            {ar: "الِاجْتِمَاعِيِّ", en: "social", color: "#333"},
            {ar: "مِثْلَ", en: "like", color: "#ff0844"},
            {ar: "فِيسْبُوك", en: "Facebook", color: "#333"},
            {ar: "وَ", en: "and", color: "#333"},
            {ar: "إِنْسِتِجْرَام", en: "Instagram", color: "#333"},
            {ar: "وَ", en: "and", color: "#333"},
            {ar: "سْنَاب", en: "Snap", color: "#333"},
            {ar: "شَات،", en: "chat,", color: "#333"},
            {ar: "حَيْثُ", en: "where", color: "#ff0844"},
            {ar: "نُرَاسِلُ", en: "we message", color: "#333"},
            {ar: "بَعْضَنَا،", en: "each other,", color: "#333"},
            {ar: "وَ", en: "and", color: "#333"},
            {ar: "نُشَارِكُ", en: "share", color: "#333"},
            {ar: "الْمَنْشُورَاتِ", en: "posts", color: "#333"},
            {ar: "وَ", en: "and", color: "#333"},
            {ar: "الْفِيدْيُوهَاتِ،", en: "videos,", color: "#333"},
            {ar: "وَ", en: "and", color: "#333"},
            {ar: "نَتَبَادَلُ", en: "exchange", color: "#333"},
            {ar: "الْأَخْبَارَ", en: "news", color: "#333"},
            {ar: "وَ", en: "and", color: "#333"},
            {ar: "الصُّوَرَ.", en: "photos.", color: "#333"},

            {ar: "<br>", en: "", color: ""}, // فاصل الفقرة الثانية

            // الفقرة الثالثة
            {ar: "كَذَلِكَ،", en: "Likewise,", color: "#ff0844"},
            {ar: "أَسْتَمْتِعُ", en: "I enjoy", color: "#333"},
            {ar: "بِلَعِبِ", en: "playing", color: "#333"},
            {ar: "الْأَلْعَابِ", en: "games", color: "#333"},
            {ar: "الْإِلِكْتُرُونِيَّةِ", en: "electronic", color: "#333"},
            {ar: "الَّتِي", en: "which", color: "#333"},
            {ar: "تُعْطِينِي", en: "give me", color: "#333"},
            {ar: "فُرْصَةً", en: "a chance", color: "#333"},
            {ar: "لِلْمُتْعَةِ", en: "for fun", color: "#333"},
            {ar: "وَ", en: "and", color: "#333"},
            {ar: "التَّحَدِّي،", en: "challenge,", color: "#333"},
            {ar: "وَ", en: "and", color: "#333"},
            {ar: "فِي", en: "in", color: "#333"},
            {ar: "نَفْسِ", en: "same", color: "#333"},
            {ar: "الْوَقْتِ", en: "time", color: "#333"},
            {ar: "أُطَوِّرُ", en: "I develop", color: "#333"},
            {ar: "مَهَارَاتِ", en: "skills", color: "#333"},
            {ar: "التَّفْكِيرِ", en: "thinking", color: "#333"},
            {ar: "وَالتَّخْطِيطِ", en: "and planning", color: "#333"},
            {ar: "وَحَلِّ", en: "and solving", color: "#333"},
            {ar: "الْمَشَاكِلِ.", en: "problems.", color: "#333"},
            {ar: "وَ", en: "And", color: "#4CAF50"},
            {ar: "أُضِيفُ", en: "I add", color: "#4CAF50"},
            {ar: "أَيْضًا", en: "also", color: "#4CAF50"},
            {ar: "أَنِّي", en: "that I", color: "#333"},
            {ar: "أَعْشَقُ", en: "adore", color: "#333"},
            {ar: "التَّسَوُّقَ", en: "shopping", color: "#333"},
            {ar: "عَبْرَ", en: "via", color: "#333"},
            {ar: "الْمَتَاجِرِ", en: "stores", color: "#333"},
            {ar: "الْإِلِكْتُرُونِيَّةِ", en: "online", color: "#333"},
            {ar: "عَلَى", en: "on", color: "#333"},
            {ar: "الْإِنْتِرْنِت.", en: "the internet.", color: "#333"}
        ];

        const container = document.getElementById('reading-text-container');
        let htmlContent = '';
        let currentIndex = 0;
        let speakTextArray = [];

        textData.forEach((item, index) => {
            if (item.ar === '<br>') {
                // إضافة فاصل سطر عمودي دون الإخلال بالمحاذاة
                htmlContent += `<div class="line-break" style="flex-basis: 100%; height: 1.5vh;"></div>`;
            } else {
                item.startIndex = currentIndex;
                item.endIndex = currentIndex + item.ar.length;
                currentIndex += item.ar.length + 1; 
                speakTextArray.push(item.ar);
                
                // إضافة دالة speakWord للنقر على الكلمة المفردة
                htmlContent += `<span id="word-${index}" class="word" data-en="${item.en}" style="color: ${item.color};" onclick="speakWord('${item.ar.replace(/[،.!]/g, '')}')">${item.ar}</span>`;
            }
        });
        
        container.innerHTML = htmlContent;
        const fullTextToSpeak = speakTextArray.join(' ');

        // --- 2. إعدادات القراءة الآلية ---
        let currentSpeed = 0.9;
        
        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
        }

        function setSpeed(speed, btnElement) {
            currentSpeed = speed;
            document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
            if(window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
                startListening();
            }
        }

        // دالة نطق كلمة واحدة عند النقر عليها
        function speakWord(wordText) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel(); 
            
            const utterance = new SpeechSynthesisUtterance(wordText);
            utterance.lang = 'ar-SA';
            utterance.rate = currentSpeed; 
            
            const voices = window.speechSynthesis.getVoices();
            const arabicVoice = voices.find(v => v.lang.includes('ar'));
            if (arabicVoice) utterance.voice = arabicVoice;

            window.speechSynthesis.speak(utterance);
        }

        function startListening() {
            if (!('speechSynthesis' in window)) return alert('متصفحك لا يدعم القراءة الآلية.');
            
            window.speechSynthesis.cancel(); 
            
            const utterance = new SpeechSynthesisUtterance(fullTextToSpeak);
            utterance.lang = 'ar-SA'; 
            utterance.rate = currentSpeed;
            
            const voices = window.speechSynthesis.getVoices();
            const arabicVoice = voices.find(v => v.lang.includes('ar'));
            if (arabicVoice) utterance.voice = arabicVoice;
            
            utterance.onboundary = (event) => {
                if (event.name === 'word') {
                    const charIndex = event.charIndex;
                    const wordObjIndex = textData.findIndex(w => w.ar !== '<br>' && w.startIndex <= charIndex && w.endIndex >= charIndex);
                    
                    if (wordObjIndex !== -1) {
                        document.querySelectorAll('.word').forEach(el => el.classList.remove('highlight'));
                        const currentWordEl = document.getElementById('word-' + wordObjIndex);
                        if (currentWordEl) currentWordEl.classList.add('highlight');
                    }
                }
            };

            utterance.onend = () => document.querySelectorAll('.word').forEach(el => el.classList.remove('highlight'));
            utterance.onerror = () => document.querySelectorAll('.word').forEach(el => el.classList.remove('highlight'));
            
            setTimeout(() => {
                window.speechSynthesis.speak(utterance);
            }, 50);
        }

        // --- 3. إعدادات التسجيل والاستماع ---
        let mediaRecorder;
        let audioChunks = [];
        let audioUrl = null;
        let studentAudio = new Audio();
        let isRecording = false;

        const btnRecord = document.getElementById('btn-record');
        const btnPlayMine = document.getElementById('btn-play-mine');
        const btnSubmit = document.getElementById('btn-submit');

        async function toggleRecording() {
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = event => {
                        if (event.data.size > 0) audioChunks.push(event.data);
                    };

                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        audioUrl = URL.createObjectURL(audioBlob);
                        studentAudio.src = audioUrl;
                        
                        btnPlayMine.classList.add('show');
                        btnSubmit.disabled = false;
                        btnSubmit.classList.add('ready');
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    btnRecord.innerHTML = 'Stop ⏹️';
                    btnRecord.classList.add('recording');
                    btnPlayMine.classList.remove('show'); 
                    
                    window.speechSynthesis.cancel();
                    document.querySelectorAll('.word').forEach(el => el.classList.remove('highlight'));
                    studentAudio.pause(); 

                } catch (err) {
                    alert("Please allow microphone access to record your reading.");
                }
            } else {
                mediaRecorder.stop();
                isRecording = false;
                btnRecord.innerHTML = 'Record 🎤';
                btnRecord.classList.remove('recording');
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
            }
        }

        function playMyRecording() {
            if (studentAudio.paused) {
                studentAudio.play();
                btnPlayMine.innerHTML = 'Pause ⏸️';
                window.speechSynthesis.cancel(); 
            } else {
                studentAudio.pause();
                btnPlayMine.innerHTML = 'Play 🎧';
            }
        }

        studentAudio.onended = () => {
            btnPlayMine.innerHTML = 'Play 🎧';
        };

        function downloadRecording() {
            if (audioUrl) {
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = audioUrl;
                a.download = 'Reading_Activity.webm'; 
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }
        }
    </script>
</body>
</html>
